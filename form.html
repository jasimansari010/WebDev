<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Form</title>
</head>
<body>
    <form action="">
        <label for="username">Name:</label>
        <input type="text" id="username" placeholder="Enter your name">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Please Write Password">
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="age">
        <br><br>
        <label for="gender">Gender:</label>
        <input type="radio" id="gender" name="gender">Male
        <input type="radio" id="gender" name="gender">Female
        <input type="radio" id="gender" name="gender">Others
        <br><br>
        <label for="course">Choose your course:</label>
        <select id="course">
            <option>C++</option>
            <option>Java</option>
            <option>Python</option>
        </select>
        <br><br>
        <label for="query">Any Question:</label><br>
        <textarea name="" id="query"></textarea><br><br>
        <input type="checkbox" id="terms">
        <label for="terms">Agree with terms & conditions:</label>
    </form>
    
</body>
</html>
